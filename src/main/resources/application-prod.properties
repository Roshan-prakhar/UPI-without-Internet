# Production profile overrides

# Server
server.port=${SERVER_PORT:8080}

# Database (example: PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/upimesh}
spring.datasource.username=${DB_USER:upimesh}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# H2 console disabled in prod
spring.h2.console.enabled=false

# Logging
logging.file.name=${LOG_FILE:logs/upimesh.log}
logging.level.com.demo.upimesh=INFO
logging.level.org.springframework=INFO

# Idempotency cache TTL (configurable)
upi.mesh.idempotency-ttl-seconds=${IDEMPOTENCY_TTL_SECONDS:86400}
upi.mesh.packet-max-age-seconds=${PACKET_MAX_AGE_SECONDS:86400}
